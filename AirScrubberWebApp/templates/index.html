<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Scrubber Flow Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg) 0%, #1e1e2f 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        h1 {
            font-size: 2.5rem;
            background: -webkit-linear-gradient(left, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in;
        }

        p.subtitle {
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Glassmorphism Card styling */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 50px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.8s ease-out backwards;
        }

        /* Forms */
        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 210, 255, 0.2);
        }

        .btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 123, 213, 0.6);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        /* Header action bar (right aligned Print) */
        .header-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Results Display */
        #results {
            display: none;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .stat-box:hover {
            transform: scale(1.02);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Summary Table */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 23, 42, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 14px 16px;
        }
        
        tr.item-row td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
        }
        
        .header-row td {
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
            padding-top: 20px;
        }

        tr:hover.item-row td {
            background: rgba(255, 255, 255, 0.02);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Print Styles */
        @media print {
            body {
                background: white !important;
                color: black !important;
                padding: 0;
            }
            .glass-card {
                background: none !important;
                border: none !important;
                box-shadow: none !important;
                margin-bottom: 30px !important;
                padding: 0;
                filter: none;
            }
            input, select {
                border: none;
                background: none;
                color: black;
                padding: 0;
                margin-bottom: 10px;
            }
            h1 {
                background: none;
                -webkit-text-fill-color: black;
            }
            .btn, button {
                display: none !important;
            }
            
            .table-wrapper {
                border: none;
                background: none;
            }
            
            table th {
                background: #f1f5f9;
                color: #334155;
            }
            table th, tr.item-row td {
                border-bottom: 1px solid #cbd5e1;
            }
            .header-row td {
                color: #0f172a;
                border-bottom: 1px solid #94a3b8;
            }
            .stat-box {
                border: 1px solid #cbd5e1;
            }
            .stat-value {
                color: #0f172a;
            }
            .stat-label {
                color: #64748b;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Air Scrubber Calculator</h1>
            <p class="subtitle">Advanced Flow Rate & System Specification Tool</p>
        </header>

        <main>
            <!-- Input Section (Flattened as requested) -->
            <section class="glass-card" style="animation-delay: 0.1s;">
                <h2 style="margin-bottom: 25px; font-weight: 600; font-size: 1.5rem;">System Parameters</h2>
                <form id="calcForm">
                    <div class="grid-form">
                        <div class="form-group">
                            <label for="cfm">Scrubber CFM</label>
                            <input type="number" id="cfm" name="cfm" value="85000" required>
                        </div>
                        <div class="form-group">
                            <label for="ratio">Per 1000 CFM Liquid/Gas Ratio</label>
                            <input type="number" step="0.1" id="ratio" name="ratio" value="6" required>
                        </div>
                        <div class="form-group">
                            <label for="tankInside">SS water tank Inside Scrubber</label>
                            <select id="tankInside" name="tankInside">
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="workingPump">Working Pump Qty.</label>
                            <input type="number" id="workingPump" name="workingPump" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="standbyPump">Standby Pump Qty.</label>
                            <input type="number" id="standbyPump" name="standbyPump" value="1" required>
                        </div>
                        <div class="form-group">
                            <label for="material">Piping & Valve Material</label>
                            <input type="text" id="material" name="material" value="Stainless Steel">
                        </div>
                        
                        <div class="form-group">
                            <label for="unitType">Unit Type</label>
                            <input type="text" id="unitType" name="unitType" value="50Coving">
                        </div>
                        <div class="form-group">
                            <label for="ahuHeight">AHU Height (mm)</label>
                            <input type="number" id="ahuHeight" name="ahuHeight" value="3850">
                        </div>
                        <div class="form-group">
                            <label for="ahuWidth">AHU Width (mm)</label>
                            <input type="number" id="ahuWidth" name="ahuWidth" value="5300">
                        </div>
                    </div>
                    
                    <div class="actions">
                        <button type="submit" class="btn" id="calcBtn">
                            <span id="btnText">Calculate & Optimize</span>
                            <div class="loader" id="loader"></div>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Results Section -->
            <section id="results">
                <div class="glass-card" style="animation-delay: 0.2s;">
                    <div class="header-actions">
                        <button class="btn" style="padding: 10px 18px; font-size: 0.95rem;" onclick="window.print()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 5px;"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                            Print Report
                        </button>
                    </div>
                    
                    <h2 style="font-weight: 600; font-size: 1.5rem; margin-bottom: 25px;">Calculation Overview</h2>
                    <div class="overview-grid">
                        <div class="stat-box">
                            <div class="stat-value" id="res-gpm">0</div>
                            <div class="stat-label">Flow Rate per Pump (GPM)</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="res-head">0</div>
                            <div class="stat-label">Total Head (mtr H2O)</div>
                        </div>
                    </div>
                </div>

                <div class="glass-card" style="animation-delay: 0.3s; margin-bottom: 20px;">
                    <h2 style="font-weight: 600; font-size: 1.5rem; margin-bottom: 20px;">Detailed Summary Table</h2>
                    <div class="table-wrapper">
                        <table id="summaryTable">
                            <thead>
                                <tr>
                                    <th width="80px">Sr. No.</th>
                                    <th>Item Description</th>
                                    <th>Ref 1</th>
                                    <th>Ref 2</th>
                                    <th>UOM</th>
                                    <th>Qty</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Rows dynamically injected -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        document.getElementById('calcForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('calcBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            
            // Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';

            // Gather data from flat forms directly
            const formData = {
                cfm: document.getElementById('cfm').value,
                ratio: document.getElementById('ratio').value,
                tankInside: document.getElementById('tankInside').value,
                workingPump: document.getElementById('workingPump').value,
                standbyPump: document.getElementById('standbyPump').value,
                material: document.getElementById('material').value,
                unitType: document.getElementById('unitType').value,
                ahuHeight: document.getElementById('ahuHeight').value,
                ahuWidth: document.getElementById('ahuWidth').value
            };

            try {
                // Record start time to show off the insane new speed
                const startTime = performance.now();
                
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                const endTime = performance.now();
                console.log(`Calculation completed in ${(endTime - startTime).toFixed(2)} ms!`);
                
                if (data.success) {
                    // Update UI
                    document.getElementById('results').style.display = 'block';
                    
                    // Render Overview - now fetching from E21 (via backend dict)
                    const gpmVal = data.data.overview.gpm_calculated 
                        ? parseFloat(data.data.overview.gpm_calculated).toFixed(1)
                        : 'N/A';
                    document.getElementById('res-gpm').innerText = gpmVal;
                    
                    const headVal = data.data.overview.head_g10_total 
                        ? parseFloat(data.data.overview.head_g10_total).toFixed(2) 
                        : 'N/A';
                    document.getElementById('res-head').innerText = headVal;

                    // Render Table Layout
                    const tbody = document.querySelector('#summaryTable tbody');
                    tbody.innerHTML = '';
                    
                    let isFirstHeader = true;

                    data.data.tables.forEach(row => {
                        const tr = document.createElement('tr');
                        
                        if (row.is_header) {
                            // If it's a sub-header, we inject a gap row first (unless it's the very first row)
                            if (!isFirstHeader) {
                                const gapRow = document.createElement('tr');
                                gapRow.innerHTML = `<td colspan="6" style="height: 40px; border: none;"></td>`;
                                tbody.appendChild(gapRow);
                            }
                            isFirstHeader = false;
                            
                            // Render the section header
                            tr.className = 'header-row';
                            tr.innerHTML = `
                                <td></td>
                                <td colspan="5">${row.desc}</td>
                            `;
                            tbody.appendChild(tr);
                        } else if (row.is_item) {
                            // Render normal items that follow the global auto-incrementing serial number!
                            tr.className = 'item-row';
                            tr.innerHTML = `
                                <td><b>${row.sr_no || ''}</b></td>
                                <td>${row.desc || ''}</td>
                                <td>${row.col_d || ''}</td>
                                <td>${row.col_e || ''}</td>
                                <td>${row.uom || ''}</td>
                                <td><strong>${row.qty || ''}</strong></td>
                            `;
                            tbody.appendChild(tr);
                        }
                    });
                    
                    // Scroll down smoothly covering the increased spacing
                    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert('Error calculating: ' + data.error);
                }
            } catch (err) {
                alert('Request failed. Check if backend is running.');
                console.error(err);
            } finally {
                // Restore state instantly
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
